<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra-2 Cinematic - HD Redesign</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050508; overflow: hidden;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; 
        }

        #starfield { position: absolute; width: 100vw; height: 100vh; z-index: 1; overflow: hidden; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: space-drift linear infinite; }

        @keyframes space-drift {
            from { transform: translateX(120vw); }
            to { transform: translateX(-120vw); }
        }

        /* --- THE NEW HD ASTRA-2 --- */
        #astra2-container {
            position: relative;
            width: 420px; height: 140px;
            z-index: 10;
            animation: ship-bob 6s ease-in-out infinite;
        }

        /* Main Engine Block */
        .engine-housing {
            position: absolute; left: 0; top: 35px;
            width: 90px; height: 70px;
            background: linear-gradient(90deg, #222, #444);
            border-radius: 8px 0 0 8px;
            border: 1px solid #555;
            z-index: 5;
            box-shadow: inset -10px 0 15px rgba(0,0,0,0.5);
        }

        /* Pulsing Thrusters */
        .thruster {
            position: absolute; left: -18px;
            width: 35px; height: 28px;
            background: radial-gradient(circle, #fff 10%, #00eaff 40%, #0044ff 90%);
            border-radius: 4px;
            box-shadow: 0 0 15px #00eaff;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .thruster-1 { top: 6px; }
        .thruster-2 { top: 36px; }

        /* Multi-layered Hull */
        .hull {
            position: absolute; left: 80px; top: 25px;
            width: 300px; height: 90px;
            background: linear-gradient(180deg, #666 0%, #333 50%, #222 100%);
            clip-path: polygon(0% 25%, 75% 0%, 100% 50%, 75% 100%, 0% 75%);
            border-left: 4px solid #444;
            z-index: 10;
            box-shadow: inset 0 5px 10px rgba(255,255,255,0.2);
        }

        /* Navigation Lights */
        .nav-light {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            animation: blink 1s infinite;
        }
        .light-red { background: red; top: 40px; left: 150px; box-shadow: 0 0 5px red; }
        .light-yellow { background: yellow; top: 60px; left: 240px; box-shadow: 0 0 5px yellow; animation-delay: 0.5s; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* Sleek Cockpit */
        .bridge {
            position: absolute; left: 140px; top: 0px;
            width: 110px; height: 35px;
            background: #1a1a1a;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            border: 1px solid #444;
            z-index: 15;
        }
        .window {
            position: absolute; left: 15px; top: 8px;
            width: 80px; height: 12px;
            background: linear-gradient(180deg, rgba(0, 234, 255, 0.6), rgba(0, 100, 200, 0.8));
            border-radius: 2px;
            box-shadow: 0 0 15px rgba(0, 234, 255, 0.4);
        }
        .window::after { /* The "Reflection" */
            content: ''; position: absolute; top: 0; left: 10%; width: 30%; height: 100%;
            background: rgba(255,255,255,0.2); transform: skewX(-20deg);
        }

        /* --- WARP EFFECTS --- */
        @keyframes ship-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .engage-warp { animation: warp-sequence 2.5s ease-in forwards !important; }
        .engage-warp .thruster {
            box-shadow: 0 0 100px 40px #fff, 0 0 200px 80px #00eaff, 0 0 400px 150px #0026ff;
            transition: box-shadow 1.5s ease-in;
        }

        @keyframes warp-sequence {
            0% { transform: translateX(0) scaleX(1); }
            30% { transform: translateX(-50px) scaleX(1); }
            50% { transform: translateX(100px) scaleX(1.4); }
            70% { transform: translateX(400px) scaleX(4); opacity: 1; }
            100% { transform: translateX(3500px) scaleX(12); opacity: 0; }
        }

        #victory-text {
            margin-top: 60px; z-index: 20;
            color: white; font-size: 2.5rem; text-transform: uppercase;
            letter-spacing: 15px; opacity: 0; font-weight: bold;
            text-shadow: 0 0 30px #00eaff;
        }

        #trigger-btn {
            position: absolute; bottom: 50px; z-index: 200;
            padding: 15px 35px; background: rgba(0,0,0,0.8); border: 2px solid #00eaff;
            color: #00eaff; cursor: pointer; font-size: 18px; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <button id="trigger-btn" onclick="triggerCinematic()">ENGAGE HYPERDRIVE</button>
    <div id="starfield"></div>

    <div id="astra2-container">
        <div class="engine-housing">
            <div class="thruster thruster-1"></div>
            <div class="thruster thruster-2"></div>
        </div>
        <div class="hull">
            <div class="nav-light light-red"></div>
            <div class="nav-light light-yellow"></div>
        </div>
        <div class="bridge">
            <div class="window"></div>
        </div>
    </div>

    <div id="victory-text">MISSION SUCCESS</div>

    <script>
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 160; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = '0px'; 
            star.style.top = `${Math.random() * 100}vh`;
            const size = Math.random() * 2.5 + 0.5;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            const duration = Math.random() * 15 + 8;
            star.style.animationDuration = `${duration}s`;
            star.style.animationDelay = `${Math.random() * -duration}s`;
            starfield.appendChild(star);
        }

        function triggerCinematic() {
            document.getElementById('trigger-btn').style.display = 'none';
            document.querySelectorAll('.star').forEach(s => {
                s.style.animationDuration = `${parseFloat(s.style.animationDuration) / 12}s`;
            });
            document.getElementById('astra2-container').classList.add('engage-warp');
            setTimeout(() => {
                const vt = document.getElementById('victory-text');
                vt.style.opacity = '1';
                vt.style.transition = 'opacity 2s ease-in';
            }, 2500);
        }
    </script>
</body>
</html>

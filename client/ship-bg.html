<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra-2 Background</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #020205; overflow: hidden;
            /* Flex keeps it centered horizontally */
            display: flex; 
            justify-content: center; 
            align-items: flex-end; /* Anchors the content to the bottom */
        }

        /* --- 1. Starfield --- */
        #starfield { position: absolute; width: 100vw; height: 100vh; z-index: 1; top: 0; left: 0; }
        .star { 
            position: absolute; background: #fff; border-radius: 50%; 
            animation: star-fall linear infinite; 
        }
        @keyframes star-fall { 
            from { transform: translateY(-10vh); } 
            to { transform: translateY(110vh); } 
        }

        /* --- 2. THE ASTRA-2 --- */
        #astra2-wrapper {
            position: relative;
            z-index: 10;
            /* Pushes the ship up from the bottom edge by 15% of the screen height */
            margin-bottom: 15vh; 
            animation: high-action-float 5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes high-action-float {
            0%, 100% { transform: translateY(30px) rotate(0deg) scale(1); }
            50% { transform: translateY(-30px) rotate(0.8deg) scale(1.04); }
        }

        #astra2-top {
            position: relative;
            width: 180px; height: 280px;
        }

        /* Thrusters */
        .thruster-glow {
            position: absolute; bottom: -15px;
            width: 35px; height: 15px;
            background: radial-gradient(ellipse at top, #fff, #00eaff 50%, transparent 90%);
            box-shadow: 0 10px 50px #00eaff;
            border-radius: 0 0 10px 10px;
            animation: engine-flicker 0.1s infinite alternate;
        }
        @keyframes engine-flicker {
            from { opacity: 0.7; transform: scaleY(1); }
            to { opacity: 1; transform: scaleY(1.3); }
        }
        .tg-1 { left: 40px; } .tg-2 { right: 40px; }

        /* Hull & Wings */
        .hull-main {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(90deg, #333, #555 50%, #333);
            clip-path: polygon(50% 0%, 100% 30%, 85% 100%, 15% 100%, 0% 30%);
            border-bottom: 5px solid #222;
        }
        .wing {
            position: absolute; bottom: 20px; width: 50px; height: 120px;
            background: #444; border: 1px solid #555; z-index: -1;
        }
        .wing-left { left: -30px; clip-path: polygon(100% 0%, 100% 100%, 0% 80%, 0% 20%); }
        .wing-right { right: -30px; clip-path: polygon(0% 0%, 0% 100%, 100% 80%, 100% 20%); }

        /* Cockpit */
        .cockpit-top {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 90px; background: #1a1a1a;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }
        .glass-top {
            position: absolute; top: 10px; left: 5px; width: 50px; height: 40px;
            background: linear-gradient(180deg, rgba(0,234,255,0.4), rgba(0,100,200,0.7));
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
        }

        /* Nav Lights */
        .nav-light {
            position: absolute; width: 6px; height: 6px; border-radius: 50%;
            animation: blink 1.2s infinite;
        }
        .nl-red { background: red; left: -20px; bottom: 40px; box-shadow: 0 0 10px red; }
        .nl-green { background: #00ff44; right: -20px; bottom: 40px; box-shadow: 0 0 10px #00ff44; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>
    <div id="starfield"></div>
    <div id="astra2-wrapper">
        <div id="astra2-top">
            <div class="thruster-glow tg-1"></div>
            <div class="thruster-glow tg-2"></div>
            <div class="wing wing-left"></div>
            <div class="wing wing-right"></div>
            <div class="hull-main"></div>
            <div class="cockpit-top"><div class="glass-top"></div></div>
            <div class="nav-light nl-red"></div>
            <div class="nav-light nl-green"></div>
        </div>
    </div>
    <script>
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}vw`; 
            star.style.top = `${Math.random() * -100}vh`; 
            const size = Math.random() * 2 + 0.5;
            star.style.width = `${size}px`; star.style.height = `${size}px`;
            const duration = Math.random() * 2 + 1; 
            star.style.animationDuration = `${duration}s`;
            star.style.animationDelay = `${Math.random() * -5}s`;
            starfield.appendChild(star);
        }
    </script>
</body>
</html>

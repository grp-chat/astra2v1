<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra-2 Tactical Terminal</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            /* THE MASTER SWITCHES - Change here to update everything instantly */
            --color-speed: #00B3FF;
            /* Neon Azure (Your new Blue) */
            --color-signal: #00ff00;
            /* Neon Green */
            --color-stealth: #aa00ff;
            /* Vivid Purple */
            --color-threat: #ff4d4d;
            /* Red / Warning */
            --color-ui: #00eaff;
            /* Base Cyan UI */
            --color-alien: #FFDAB9;
            /* Or for a neon look: #FF8C00 */
        }

        body {
            margin: 0;
            padding: 10px;
            background: #000;
            color: var(--color-ui);
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            box-sizing: border-box;
            overflow: hidden;
        }

        #lobby-screen {
            display: flex;
            gap: 15px;
            flex: 1;
            padding: 10px;
            min-height: 0;
        }

        .column {
            flex: 1;
            border: 2px solid var(--color-ui);
            display: flex;
            flex-direction: column;
            padding: 10px;
            background: rgba(0, 234, 255, 0.05);
        }

        .column h3 {
            text-align: center;
            border-bottom: 1px solid var(--color-ui);
            padding-bottom: 8px;
            margin: 0 0 10px 0;
            font-size: 0.9rem;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .player-btn,
        .action-btn {
            background: rgba(0, 234, 255, 0.1);
            border: 3px solid var(--color-ui);
            color: var(--color-ui);
            font-family: inherit;
            text-transform: uppercase;
            cursor: pointer;
        }

        .player-btn {
            padding: 12px;
            font-size: 1.05rem;
        }

        .player-btn:hover {
            background: var(--color-ui);
            color: #000;
        }

        .player-finished {
            padding: 12px;
            border: 1px solid rgba(0, 234, 255, 0.2);
            color: rgba(0, 234, 255, 0.3);
            text-align: center;
            text-transform: uppercase;
        }

        #action-screen {
            display: none;
            flex-direction: column;
            flex: 1;
        }

        .header-box {
            border: 1px solid var(--color-ui);
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(0, 234, 255, 0.05);
        }

        .header-top {
            font-size: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .occupant-bar {
            font-size: 1.5rem;
            border-top: 1px solid rgba(0, 234, 255, 0.2);
            padding-top: 5px;
            color: var(--color-ui);
            text-transform: uppercase;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            flex: 1;
            min-height: 0;
        }

        .action-btn {
            height: 100%;
            font-size: 1.2rem;
            padding: 5px;
            transition: transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.95);
            background: #fff;
            color: #000;
        }

        .action-btn.blank {
            border-color: rgba(0, 234, 255, 0.1) !important;
            color: rgba(0, 234, 255, 0.1) !important;
            cursor: default;
            pointer-events: none;
        }

        .action-btn.petrified-skip {
            border: 2px solid var(--color-threat) !important;
            color: var(--color-threat) !important;
            background: rgba(255, 77, 77, 0.1);
        }

        .action-btn.sabotage-btn {
            border-style: dashed !important;
            font-weight: bold;
        }

        #move-overlay {
            position: fixed;
            top: 10%;
            left: 0;
            width: 100%;
            height: 90%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .exit-link {
            text-align: center;
            margin-top: 10px;
            color: var(--color-threat);
            cursor: pointer;
            font-size: 10px;
            text-decoration: underline;
        }

        .occupant-bar {
            font-size: 1.3rem;
            border-top: 1px solid rgba(0, 234, 255, 0.2);
            padding-top: 5px;
            color: var(--color-ui);
            text-transform: uppercase;
            /* NEW: This spreads the vision and alien team apart */
            display: flex;
            justify-content: space-between;
        }

        .alien-team-display {
            color: var(--color-alien);
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 218, 185, 0.4);
        }

        .manual-save-trigger {
            position: absolute;
            bottom: 20px;
            right: 10px;
            background: rgba(0, 234, 255, 0.05);
            border: 1px solid rgba(0, 234, 255, 0.4);
            color: var(--color-ui);
            font-family: inherit;
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 6px 10px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
        }

        .manual-save-trigger:hover {
            background: var(--color-ui);
            color: #000;
            box-shadow: 0 0 10px var(--color-ui);
        }

        .save-icon {
            font-size: 11px;
        }

        /* We need to add padding to the bottom of the list 
   so the last names aren't covered by the button */
        #finished-list {
            padding-bottom: 40px;
        }
    </style>
</head>

<body>

    <div id="lobby-screen">
        <div class="column">
            <h3>[ WAITING ]</h3>
            <div id="waiting-list" class="player-list"></div>
        </div>
        <div class="column" , style="position: relative;">
            <h3>[ FINISHED ]</h3>
            <div id="finished-list" class="player-list"></div>

            <button class="manual-save-trigger" onclick="triggerManualSave()">
                <span class="save-icon">💾</span> ARCHIVE STATE
            </button>
        </div>
        <div style="position: absolute; bottom: 10px; right: 20px;" onclick="exitTerminal()" class="exit-link">
            BACK TO MAIN MENU</div>
    </div>

    <div id="action-screen">
        <div class="header-box">
            <div class="header-top">
                <span id="user-id" style="font-weight:bold;">USER: ---</span>
                <span id="loc-id">LOC: ---</span>
            </div>
            <div id="room-occupants" class="occupant-bar">SCANNING...</div>
        </div>
        <div class="action-grid" id="grid"></div>
        <div class="exit-link" onclick="backToLobby()">GO BACK</div>
    </div>

    <div id="move-overlay">
        <h3 id="overlay-title">SELECT TARGET</h3>
        <div id="move-options" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px;"></div>
        <button onclick="closeMove()"
            style="margin-top:20px; color:var(--color-threat); background:none; border:1px solid var(--color-threat); padding:10px; cursor:pointer;">BACK</button>
    </div>

    <script>
        const socket = io();
        let activePlayer = "";

        // socket.on("STATE_UPDATE", (state) => {
        //     if (state.turnData) {
        //         const waitingDiv = document.getElementById("waiting-list");
        //         const finishedDiv = document.getElementById("finished-list");
        //         waitingDiv.innerHTML = ""; finishedDiv.innerHTML = "";

        //         state.turnData.waiting.forEach(name => {
        //             const btn = document.createElement("button");
        //             btn.className = "player-btn";
        //             btn.textContent = name;
        //             btn.onclick = () => { activePlayer = name; socket.emit("SELECT_PLAYER", name); };
        //             waitingDiv.appendChild(btn);
        //         });

        //         state.turnData.finished.forEach(name => {
        //             const div = document.createElement("div");
        //             div.className = "player-finished";
        //             div.textContent = name + " [OK]";
        //             finishedDiv.appendChild(div);
        //         });
        //     }
        // });




        socket.on("STATE_UPDATE", (state) => {
            if (state.turnData) {
                const waitingDiv = document.getElementById("waiting-list");
                const finishedDiv = document.getElementById("finished-list");
                waitingDiv.innerHTML = "";
                finishedDiv.innerHTML = "";

                // 1. Waiting List: Always show all players so they can take multiple actions
                // We pull names from the main players object to ensure everyone is visible
                Object.keys(state.players).forEach(name => {
                    const btn = document.createElement("button");
                    btn.className = "player-btn";
                    btn.textContent = name;
                    btn.onclick = () => { activePlayer = name; socket.emit("SELECT_PLAYER", name); };
                    waitingDiv.appendChild(btn);
                });

                // 2. Finished List: Show total counter and scrolling history
                const counterDisplay = document.createElement("div");
                counterDisplay.className = "player-finished";
                counterDisplay.style.color = "var(--color-speed)";
                counterDisplay.style.borderBottom = "1px solid var(--color-speed)";
                counterDisplay.style.marginBottom = "10px";
                counterDisplay.style.fontWeight = "bold";
                counterDisplay.textContent = `ROUND PROGRESS: ${state.turnData.finished.length} / 6`;
                finishedDiv.appendChild(counterDisplay);

                state.turnData.finished.forEach((name, index) => {
                    const div = document.createElement("div");
                    div.className = "player-finished";
                    div.style.fontSize = "0.8rem";
                    div.style.padding = "8px";
                    div.style.borderBottom = "1px solid rgba(0, 234, 255, 0.1)";
                    div.textContent = `${index + 1}. ${name.toUpperCase()} [OK]`;
                    finishedDiv.appendChild(div);
                });

                // Scroll the finished list to the bottom automatically
                finishedDiv.scrollTop = finishedDiv.scrollHeight;
            }
        });


        socket.on("PLAYER_SCREEN_LOAD", (data) => {
            // 1. Switch Screens
            document.getElementById("lobby-screen").style.display = "none";
            const actionScreen = document.getElementById("action-screen");
            actionScreen.style.display = "flex";

            // 2. Update Header Info
            document.getElementById("user-id").textContent = `USER: ${data.playerName.toUpperCase()}`;
            document.getElementById("loc-id").textContent = `LOC: ${data.location.toUpperCase()}`;

            // 3. Update Vision & Alien Team
            const occupantsDiv = document.getElementById("room-occupants");
            const visionText = data.roomMates.length > 0 ? `VISIBLE: ${data.roomMates.join(", ")}` : "NO LIFEFORMS DETECTED";

            let alienDisplay = "";
            if (data.isAlien) {
                alienDisplay = `<span class="alien-team-display">ALIENS: ${data.alienTeam.join(", ")}</span>`;
            }
            occupantsDiv.innerHTML = `<div>${visionText}</div> ${alienDisplay}`;

            // 4. Build Action Grid
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            data.buttons.forEach(btn => {
                const b = document.createElement("button");
                b.className = "action-btn";

                if (btn === "BLANK") {
                    b.classList.add("blank");
                    b.textContent = "---";
                } else if (btn === "SKIP") {
                    b.textContent = data.isPetrified ? "RECOVER" : "SKIP TURN";
                    if (data.isPetrified) b.classList.add("petrified-skip");
                    b.onclick = () => submitAction("SKIP");
                } else if (btn === "MOVE") {
                    b.textContent = "MOVE";
                    b.onclick = () => showTargetOverlay("SELECT DESTINATION", data.adjacentRooms, (room) => {
                        submitAction("MOVE", { targetRoom: room });
                    });
                } else if (btn === "PETRIFY") {
                    b.textContent = "PETRIFY";
                    b.style.color = "var(--color-threat)";
                    b.onclick = () => {
                        if (data.roomMates.length === 0) return alert("NO TARGETS IN ROOM");
                        showTargetOverlay("SELECT VICTIM", data.roomMates, (victim) => {
                            submitAction("PETRIFY", { targetPlayer: victim });
                        });
                    };
                } else {
                    // It's a Task or Sabotage
                    b.textContent = btn.name;
                    b.style.borderColor = btn.color;
                    if (btn.isSabotage) b.classList.add("sabotage-btn");

                    b.onclick = () => {
                        submitAction(btn.isSabotage ? "SABOTAGE" : "TASK", {
                            taskName: btn.name,
                            taskType: btn.type
                        });
                    };
                }
                grid.appendChild(b);
            });
        });

        // Add this inside the <script> tag in action.html
        socket.on("SAVE_STATUS", (status) => {
            const btn = document.querySelector(".manual-save-trigger");
            if (!btn) return;

            if (status === "SAVING") {
                btn.innerHTML = `<span class="save-icon">⏳</span> AUTOSAVING...`;
                btn.style.color = "var(--color-speed)";
            }
            else if (status === "SUCCESS") {
                btn.innerHTML = `<span class="save-icon">✅</span> ARCHIVED!`;
                btn.style.color = "var(--color-signal)";

                setTimeout(() => {
                    btn.innerHTML = `<span class="save-icon">💾</span> ARCHIVE STATE`;
                    btn.style.color = "";
                }, 2000);
            }
        });




        function submitAction(type, extraData = {}) {
            socket.emit("SUBMIT_ACTION", {
                playerName: activePlayer,
                actionType: type,
                ...extraData
            });
            backToLobby();
        }

        function showTargetOverlay(title, options, callback) {
            document.getElementById("move-overlay").style.display = "flex";
            document.getElementById("overlay-title").textContent = title;
            const container = document.getElementById("move-options");
            container.innerHTML = "";

            options.forEach(item => {
                const b = document.createElement("button");
                b.className = "action-btn";
                b.style.padding = "15px 20px";
                b.textContent = item;
                b.onclick = () => {
                    callback(item);
                    closeMove();
                };
                container.appendChild(b);
            });
        }

        function backToLobby() {
            closeMove();
            document.getElementById("action-screen").style.display = "none";
            document.getElementById("lobby-screen").style.display = "flex";
        }

        function closeMove() {
            document.getElementById("move-overlay").style.display = "none";
        }

        function exitTerminal() {
            window.parent.postMessage("CLOSE_ACTION", "*");
        }

        async function triggerManualSave() {
            const btn = document.querySelector(".manual-save-trigger");
            const originalText = btn.innerHTML;

            try {
                btn.innerHTML = `<span class="save-icon">⏳</span> SAVING...`;

                // 1. Get the current state from the server's memory
                const response = await fetch("/current-game");
                const result = await response.json();

                if (result.success) {
                    // 2. Send it back to the /save-game route you already built
                    await fetch("/save-game", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(result.data)
                    });

                    btn.innerHTML = `<span class="save-icon">✅</span> SAVED!`;
                    btn.style.color = "var(--color-signal)";
                }
            } catch (err) {
                btn.innerHTML = `<span class="save-icon">❌</span> ERROR`;
            }

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.color = "";
            }, 2000);
        }
    </script>
</body>

</html>
